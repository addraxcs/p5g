# Installed to: /etc/sysctl.d/99-p5r-forward.conf
# Enables IPv4 forwarding so the pi can route LAN -> WAN.
#
# IPv6 is left off by default. Most 4G SIMs give IPv4-only or CGNAT IPv6 that
# is not useful to route. Enable only if you have confirmed a routable v6
# prefix from the carrier.

net.ipv4.ip_forward = 1
net.ipv4.conf.all.forwarding = 1

# net.ipv6.conf.all.forwarding = 1   # leave disabled unless explicitly needed

# Dampen asymmetric-route drops on a dual-interface box.
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2
